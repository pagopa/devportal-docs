name: Crowdin Action

on:
  push:
    branches: [ main ]

jobs:
  synchronize-with-crowdin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.JS
        uses: ./.github/actions/setup-node

      # (Ho mantenuto la tua cache intatta)
      - name: Cache npm dependencies
        id: cache-npm
        uses: actions/cache@v3 # Nota: ho messo v3 standard, se usi hash specifico va bene uguale
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: |
          npm config set cache ~/.npm
          npm ci

      # --- MODIFICA QUI: Aggiunto id: extract_files ---
      - name: Generate crowdin file
        id: extract_files
        run: npm run generate_file

      - name: crowdin action
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          upload_translations: false
          auto_approve_imported: true
          download_translations: false
          create_pull_request: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      # --- MODIFICA QUI: Passaggio dei parametri ---
      - name: Trigger download workflow
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh workflow run getTranslations.yml \
            --repo Uqido/PagopaTranslationPocTarget \
            --ref main \
            -f files='${{ steps.extract_files.outputs.found_files }}'