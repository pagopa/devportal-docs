name: Push documentation on public repository

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: 'Private repository branch from which to checkout'
        required: true
        default: 'docs/from-gitbook'
        type: string
      target_branch:
        description: 'Public repository branch from which to checkout'
        required: true
        default: 'main'
        type: string
      public_repository:
        description: 'Name of the public repository to push to (owner/repo format)'
        required: true
        default: 'pagopa/public_doc'
        type: string
      commit_message:
        description: 'Custom commit message'
        required: false
        default: 'Update documentation'
        type: string
      paths_to_add:
        description: 'Comma-separated list of paths to add'
        required: false
        default: ''
        type: string
      paths_to_remove:
        description: 'Comma-separated list of paths to remove'
        required: false
        default: ''
        type: string

jobs:
  push-to-target:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}
          path: private_repo

      - name: Checkout public repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_branch }}
          repository: ${{ inputs.public_repository }}
          token: ${{ secrets.PAT }}
          path: public_repo

      - name: Sync Repositories content
        id: sync_step
        env:
          PATHS_TO_ADD: ${{ inputs.paths_to_add }}
          PATHS_TO_REMOVE: ${{ inputs.paths_to_remove }}
        run: |
          chmod +x private_repo/scripts/synch_repo.sh
          ./private_repo/scripts/synch_repo.sh

      - name: Push commit to public repo
        run: |
          cd public_repo
          
          git config user.name "${{ vars.GH_USER_NAME }}"
          git config user.email "${{ vars.GH_MAIL }}"
          
          echo "${{ steps.sync_step.outputs.modified_files }}" | while IFS= read -r file; do
            if [[ -n "$file" ]]; then
              git add -A -- "$file"
            fi
          done
          
          if git diff-index --quiet HEAD; then
            echo "No updates to commit"
          else
            git commit -m "${{ inputs.commit_message }}"
            git push origin ${{ inputs.target_branch }}
          fi