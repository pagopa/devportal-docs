name: Upload sources to Crowdin

on:
  workflow_dispatch:
    inputs:
      paths_to_upload:
        description: Comma separated list of paths to upload. Leave empty to upload nothing unless "upload all" is checked. (e.g. app-io/io-guida-tecnica/v7.2)
        required: false
        type: string
      paths_to_delete:
        description: Comma separated list of paths to remove from docs-structure.
        required: false
        type: string
      upload_all:
        description: Upload all docs (rebuild from dirNames). When unchecked, leaving "paths to upload" empty uploads nothing.
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      paths_to_upload:
        description: Comma separated list of paths to upload. Leave empty to upload nothing unless "upload all" is enabled.
        required: false
        type: string
      paths_to_delete:
        description: Comma separated list of paths to remove from docs-structure.
        required: false
        type: string
      upload_all:
        description: Upload all docs (rebuild from dirNames). When false, leaving "paths to upload" empty uploads nothing.
        required: false
        default: false
        type: boolean
    secrets:
      GH_PAT_TOKEN:
        required: true
      CROWDIN_PROJECT_ID:
        required: true
      CROWDIN_PERSONAL_TOKEN:
        required: true

permissions:
  contents: write


jobs:
  upload-sources-to-crowdin:
    runs-on: ubuntu-latest

    steps:
      - name: Validate inputs
        env:
          PATHS_TO_UPLOAD: ${{ inputs.paths_to_upload || '' }}
          PATHS_TO_DELETE: ${{ inputs.paths_to_delete || '' }}
          UPLOAD_ALL: ${{ inputs.upload_all || 'false' }}
        run: |
          if [ -z "$PATHS_TO_UPLOAD" ] && [ -z "$PATHS_TO_DELETE" ] && [ "$UPLOAD_ALL" != "true" ]; then
            echo "::error::Nothing to do: provide 'paths_to_upload', 'paths_to_delete', or enable 'upload_all'."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Checkout docs from source branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ vars.CHECKOUT_BRANCH || 'docs/from-gitbook' }}
          path: docs-source
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Move docs into workspace root
        run: |
          rm -rf docs
          rm -f docs-structure.json
          mv docs-source/docs docs
          if [ -f docs-source/docs-structure.json ]; then mv docs-source/docs-structure.json docs-structure.json; fi

      - name: Setup Node.JS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate docs structure manifest
        env:
          PATHS_TO_UPLOAD: ${{ inputs.paths_to_upload || '' }}
          PATHS_TO_DELETE: ${{ inputs.paths_to_delete || '' }}
          UPLOAD_ALL: ${{ inputs.upload_all || 'false' }}
        run: npm run generate_doc_structure

      - name: Commit docs structure manifest
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$(git status --porcelain -- docs-structure.json)" ]; then
            cp docs-structure.json docs-source/docs-structure.json

            cd docs-source
            git config user.name "devportal-portalsandtools-github-bot"
            git config user.email "180539351+devportal-portalsandtools-github-bot@users.noreply.github.com"

            git config --unset-all http.https://github.com/.extraheader || true

            # Token owner determines write access; username segment is ignored for PATs.
            git remote set-url origin https://x-access-token:${GH_PAT}@github.com/pagopa/devportal-docs.git

            git add docs-structure.json

            if git diff --cached --quiet -- docs-structure.json; then
              echo "docs-structure.json already up to date in docs-source. Nothing to commit."
            else
              git commit -m "chore: update docs structure manifest"
              git push origin HEAD:${{ vars.CHECKOUT_BRANCH || 'docs/from-gitbook' }}
            fi
          else
            echo "No docs-structure.json changes to commit."
          fi

      - name: Generate crowdin file
        id: extract_files
        if: ${{ inputs.paths_to_upload != '' || inputs.paths_to_delete != '' || inputs.upload_all }}
        env:
          PATHS_TO_UPLOAD: ${{ inputs.paths_to_upload || '' }}
          PATHS_TO_DELETE: ${{ inputs.paths_to_delete || '' }}
          UPLOAD_ALL: ${{ inputs.upload_all || 'false' }}
        run: npm run generate_file

      - name: crowdin action
        if: ${{ inputs.paths_to_upload != '' || inputs.paths_to_delete != '' || inputs.upload_all }}
        uses: crowdin/github-action@52aa776766211d83d975df51f3b9c53c2f8ba35f
        with:
          upload_sources: true
          upload_translations: false
          download_translations: false
          create_pull_request: false
          base_url: 'https://pagopa.crowdin.com'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ vars.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
