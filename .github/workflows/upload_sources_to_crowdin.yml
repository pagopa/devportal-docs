name: Upload sources to Crowdin

on:
  workflow_dispatch:
    inputs:
      paths_to_upload:
        description: Optional docs-relative paths, comma or newline separated.
        required: false
        type: string
      paths_to_delete:
        description: Optional docs-relative paths to remove from docs-structure, comma or newline separated.
        required: false
        type: string
  workflow_call:
    inputs:
      paths_to_upload:
        description: Optional docs-relative paths, comma or newline separated.
        required: false
        type: string
      paths_to_delete:
        description: Optional docs-relative paths to remove from docs-structure, comma or newline separated.
        required: false
        type: string
    secrets:
      CROWDIN_PROJECT_ID:
        required: true
      CROWDIN_PERSONAL_TOKEN:
        required: true

permissions:
  contents: write

jobs:
  upload-sources-to-crowdin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.JS
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate docs structure manifest
        env:
          PATHS_TO_UPLOAD: ${{ inputs.paths_to_upload || '' }}
          PATHS_TO_DELETE: ${{ inputs.paths_to_delete || '' }}
        run: npm run generate_doc_structure

      - name: Commit docs structure manifest
        run: |
          if [ -n "$(git status --porcelain -- docs-structure.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs-structure.json
            git commit -m "chore: update docs structure manifest"
            git push
          else
            echo "No docs-structure.json changes to commit."
          fi

      - name: Generate crowdin file
        id: extract_files
        env:
          PATHS_TO_UPLOAD: ${{ inputs.paths_to_upload || '' }}
        run: npm run generate_file

      - name: crowdin action
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          upload_translations: false
          auto_approve_imported: true
          download_translations: false
          create_pull_request: false
          base_url: 'https://pagopa.crowdin.com'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
