name: Upload sources to Crowdin

on:
  workflow_dispatch:
    inputs:
      paths_to_upload:
        description: Comma separated list of paths to upload. Leave empty to upload all. (e.g. app-io/io-guida-tecnica/v7.2)
        required: false
        type: string
      paths_to_delete:
        description: Comma separated list of paths to remove from docs-structure.
        required: false
        type: string
  workflow_call:
    inputs:
      paths_to_upload:
        description: Comma separated list of paths to upload. Leave empty to upload all.
        required: false
        type: string
      paths_to_delete:
        description: Comma separated list of paths to remove from docs-structure.
        required: false
        type: string
    secrets:
      GH_PAT_TOKEN:
        required: true
      CROWDIN_PROJECT_ID:
        required: true
      CROWDIN_PERSONAL_TOKEN:
        required: true

permissions:
  contents: write


jobs:
  upload-sources-to-crowdin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Checkout docs from source branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ vars.CHECKOUT_BRANCH || 'docs/from-gitbook' }}
          path: docs-source
          token: ${{ secrets.GH_PAT_TOKEN }}
          persist-credentials: false

      - name: Move docs into workspace root
        run: |
          rm -rf docs
          rm -f docs-structure.json
          mv docs-source/docs docs
          if [ -f docs-source/docs-structure.json ]; then mv docs-source/docs-structure.json docs-structure.json; fi

      - name: Setup Node.JS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate docs structure manifest
        env:
          PATHS_TO_UPLOAD: ${{ inputs.paths_to_upload || '' }}
          PATHS_TO_DELETE: ${{ inputs.paths_to_delete || '' }}
        run: npm run generate_doc_structure

      - name: Commit docs structure manifest
        env:
          GH_PAT_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        run: |
          if [ -n "$(git status --porcelain -- docs-structure.json)" ]; then
            # Copy the updated manifest back into the docs-source checkout,
            # which is already on the docs/from-gitbook branch.
            cp docs-structure.json docs-source/docs-structure.json

            # Commit and push from docs-source so the commit is based on
            # (and pushed to) the correct branch.
            cd docs-source
            git config user.name "devportal-portalsandtools-github-bot"
            git config user.email "devportal-portalsandtools-github-bot@pagopa.it"
            
            # Ensure any checkout-provided auth header is removed so PAT auth is used.
            git config --unset-all http.https://github.com/.extraheader || true

            # Use PAT-authenticated remote URL for push.
            git remote set-url origin https://devportal-portalsandtools-github-bot:${GH_PAT_TOKEN}@github.com/pagopa/devportal-docs.git
            
            git add docs-structure.json
            git commit -m "chore: update docs structure manifest"
            git push origin HEAD:${{ vars.CHECKOUT_BRANCH || 'docs/from-gitbook' }}
          else
            echo "No docs-structure.json changes to commit."
          fi

      - name: Generate crowdin file
        id: extract_files
        env:
          PATHS_TO_UPLOAD: ${{ inputs.paths_to_upload || '' }}
        run: npm run generate_file

      - name: crowdin action
        uses: crowdin/github-action@8868a33591d21088edfc398968173a3b98d51706
        with:
          upload_sources: true
          upload_translations: false
          auto_approve_imported: true
          download_translations: false
          create_pull_request: false
          base_url: 'https://pagopa.crowdin.com'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ vars.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
